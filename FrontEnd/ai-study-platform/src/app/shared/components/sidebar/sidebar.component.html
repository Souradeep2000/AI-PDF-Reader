<!-- Mobile overlay -->
@if (isOpen) {
  <div
    class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 md:hidden"
    (click)="closeSidebar.emit()"
  ></div>
}

<!-- MOBILE SIDEBAR -->
<aside
  class="fixed top-[72px] left-0 z-50 h-[calc(100vh-72px)] w-[280px] border-r border-slate-200 dark:border-white/10 bg-white/90 dark:bg-slate-950/95 backdrop-blur-xl transition-transform duration-300 md:hidden"
  [class.translate-x-0]="isOpen"
  [class.-translate-x-full]="!isOpen"
>
  <div class="h-full flex flex-col">
    <div class="p-5">
      <button
        class="w-full rounded-2xl bg-gradient-to-r from-violet-600 to-emerald-500 p-[1px]"
      >
        <div
          class="rounded-2xl bg-slate-950 px-4 py-3 hover:bg-slate-900 transition"
        >
          + New Chat
        </div>
      </button>
    </div>

    <div class="px-4">
      <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">
        Recent Chats
      </p>

      <div class="space-y-2">
        <div
          class="rounded-xl p-3 bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 transition"
        >
          DBMS Unit 2
        </div>

        <div
          class="rounded-xl p-3 bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 transition"
        >
          Computer Networks
        </div>
      </div>
    </div>
  </div>
</aside>

<!-- DESKTOP SIDEBAR -->
<aside
  class="hidden md:block overflow-hidden shrink-0 transition-all duration-300 border-r border-slate-200 dark:border-white/10 bg-white/90 dark:bg-slate-950/95 backdrop-blur-xl"
  [class.w-[280px]]="isOpen"
  [class.w-0]="!isOpen"
>
  <div class="w-[280px] h-full flex flex-col">
    <div class="p-5">
      <button
        class="w-full rounded-2xl bg-gradient-to-r from-violet-600 to-emerald-500 p-[1px]"
      >
        <div
          class="rounded-2xl bg-slate-950 px-4 py-3 hover:bg-slate-900 transition"
        >
          + New Chat
        </div>
      </button>
    </div>

    <div class="px-4">
      <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">
        Recent Chats
      </p>

      <div class="space-y-2">
        <div
          class="rounded-xl p-3 bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 transition"
        >
          DBMS Unit 2
        </div>

        <div
          class="rounded-xl p-3 bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 transition"
        >
          Computer Networks
        </div>
      </div>
    </div>
  </div>
</aside>
