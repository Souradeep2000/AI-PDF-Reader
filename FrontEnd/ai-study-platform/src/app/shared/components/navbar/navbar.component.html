<header
  class="h-[72px] border-b border-slate-200 dark:border-white/10 bg-white/90 dark:bg-slate-950/80 backdrop-blur-xl px-4 md:px-6 flex items-center justify-between sticky top-0 z-50"
>
  <div class="flex items-center gap-3">
    @if (showChat) {
      <button
        (click)="closeChat.emit()"
        class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 transition"
      >
        ←
      </button>
    }
    <!-- Menu button -->
    <button
      (click)="menuClick.emit()"
      class="rounded-xl p-2 bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 transition"
    >
      ☰
    </button>

    <!-- Logo -->
    <div
      class="w-9 h-9 md:w-10 md:h-10 rounded-2xl bg-gradient-to-r from-violet-600 to-emerald-500 flex items-center justify-center text-white"
    >
      A
    </div>

    <!-- Branding -->
    <div>
      <h1
        class="font-semibold text-slate-900 dark:text-white text-base md:text-lg"
      >
        AI<span class="text-violet-500"> Study </span>
      </h1>

      <p class="text-[10px] md:text-xs text-slate-500 dark:text-slate-400">
        Learn Smarter
      </p>
    </div>
  </div>

  <!-- Right actions -->
  <div class="flex items-center gap-2">
    <button
      class="hidden md:block rounded-2xl px-4 py-2 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 hover:bg-slate-200 dark:hover:bg-white/10 transition"
    >
      Analytics
    </button>

    <app-theme-toggle />

    <button
      class="rounded-xl md:rounded-2xl px-3 md:px-4 py-2 text-sm md:text-base text-white bg-gradient-to-r from-violet-600 to-emerald-500 hover:opacity-90 transition"
    >
      Generate Test
    </button>
  </div>
</header>
