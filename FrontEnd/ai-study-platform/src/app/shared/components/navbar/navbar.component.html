<header
  class="h-[72px] border-b border-slate-200 dark:border-white/10 bg-white/90 dark:bg-slate-950/80 backdrop-blur-xl px-4 md:px-6 flex items-center justify-between sticky top-0 z-50"
>
  <div class="flex items-center gap-3">
    <!-- Mobile menu -->
    <button
      (click)="menuClick.emit()"
      class="rounded-xl p-2 bg-white/5 hover:bg-white/10 transition"
    >
      ☰
    </button>

    <div
      class="w-9 h-9 md:w-10 md:h-10 rounded-2xl bg-gradient-to-r from-violet-600 to-emerald-500 flex items-center justify-center"
    >
      A
    </div>

    <div>
      <h1 class="font-semibold text-base md:text-lg">
        AI<span class="text-violet-400"> Study </span>
      </h1>

      <p class="text-[10px] md:text-xs text-slate-400">Learn Smarter</p>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <button
      class="hidden md:block rounded-2xl px-4 py-2 bg-white/5 border border-slate-200 dark:border-white/10"
    >
      Analytics
    </button>

    <app-theme-toggle />

    <button
      class="rounded-xl md:rounded-2xl px-3 md:px-4 py-2 text-sm md:text-base bg-gradient-to-r from-violet-600 to-emerald-500"
    >
      Generate Test
    </button>
  </div>
</header>
