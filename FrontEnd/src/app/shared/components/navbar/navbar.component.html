<header
  class="h-[72px] border-b border-slate-200 dark:border-white/10 bg-white/90 dark:bg-slate-950/80 backdrop-blur-xl px-4 md:px-6 flex items-center justify-between sticky top-0 z-50"
>
  <div class="flex items-center gap-2 md:gap-3">
    @if (showChat) {
      <button
        (click)="closeChat.emit()"
        class="px-3 py-2 md:px-4 rounded-xl bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 transition text-sm md:text-base"
      >
        ←
      </button>
    }
    <button
      (click)="menuClick.emit()"
      class="rounded-xl p-2 bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 transition text-sm md:text-base"
    >
      ☰
    </button>

    <div
      routerLink="/"
      class="w-8 h-8 md:w-10 md:h-10 rounded-xl md:rounded-2xl bg-gradient-to-r from-violet-600 to-emerald-500 flex items-center justify-center text-white text-sm md:text-base font-bold cursor-pointer select-none transition-opacity hover:opacity-80"
    >
      AI
    </div>

    <div
      class="leading-tight cursor-pointer select-none transition-opacity hover:opacity-80"
      routerLink="/"
    >
      <h1
        class="font-semibold text-slate-900 dark:text-white text-sm md:text-lg tracking-tight"
      >
        <span class="text-violet-500"> DOCS READER </span>
      </h1>

      <p class="text-[9px] md:text-xs text-slate-500 dark:text-slate-400">
        Prepare Smarter
      </p>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <button
      class="hidden md:block rounded-2xl px-4 py-2 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 hover:bg-slate-200 dark:hover:bg-white/10 transition text-sm"
    >
      Analytics
    </button>

    <app-theme-toggle />

    <button
      class="rounded-xl md:rounded-2xl px-2.5 md:px-4 py-2 text-xs md:text-sm font-medium text-white bg-gradient-to-r from-violet-600 to-emerald-500 hover:opacity-90 transition whitespace-nowrap"
    >
      Generate Test
    </button>
  </div>
</header>
