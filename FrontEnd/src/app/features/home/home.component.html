<div
  class="h-full overflow-auto bg-gradient-to-b from-slate-100 to-white dark:from-slate-950 dark:to-slate-900"
>
  <div
    *ngIf="!chatState.isChatOpen()"
    class="max-w-6xl mx-auto px-6 py-10 md:py-16 flex flex-col items-center text-center"
  >
    <!-- Badge -->
    <div
      class="mb-6 rounded-full border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 px-4 py-2 text-sm text-slate-700 dark:text-slate-300"
    >
      AI-powered Documents Reader Assistant
    </div>

    <h1
      class="text-slate-900 dark:text-white text-3xl sm:text-5xl md:text-7xl font-bold leading-tight max-w-5xl"
    >
      Prepare Smarter with
      <span
        class="bg-gradient-to-r from-violet-500 to-emerald-400 bg-clip-text text-transparent"
      >
        AI
      </span>
    </h1>

    <p
      class="text-slate-600 dark:text-slate-400 text-sm md:text-lg mt-6 max-w-2xl"
    >
      Upload notes, ask questions, generate tests, and learn faster with
      semantic AI search.
    </p>

    <app-upload-zone (uploadCompleted)="onUploadCompleted()" />
  </div>

  <app-chat *ngIf="chatState.isChatOpen()" />
</div>
